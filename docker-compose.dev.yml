services:
  # postgres:
  #   image: postgres:16-alpine
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: menu_tree
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      SERVER_PORT: "8080"
    # depends_on:
    #   - postgres
    develop:
      watch:
        - action: rebuild
          path: ./backend
          ignore:
            - .git/
            - tmp/

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    develop:
      watch:
        - action: rebuild
          path: ./frontend
          ignore:
            - .git/
            - .next/
            - node_modules/

volumes:
  pgdata:
